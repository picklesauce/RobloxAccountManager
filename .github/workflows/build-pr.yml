name: Build PR Artifact

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches-ignore:
      - main

permissions:
  pull-requests: write
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build EXE
        shell: bash
        run: |
          pyinstaller \
            --onefile \
            --windowed \
            --icon=icon.ico \
            --name=RobloxAccountManager \
            --hidden-import=win32api \
            --hidden-import=win32con \
            --hidden-import=win32gui \
            --hidden-import=win32process \
            --hidden-import=win32clipboard \
            --hidden-import=win32event \
            --hidden-import=pywintypes \
            --collect-all=PIL \
            --collect-all=discord \
            --collect-all=webdriver_manager \
            --collect-all=Crypto \
            --collect-all=selenium \
            --collect-all=trio \
            --collect-all=trio_websocket \
            --collect-all=outcome \
            --collect-all=sniffio \
            --collect-all=pywinauto \
            --collect-all=comtypes \
            --collect-all=autoit \
            main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RobloxAccountManager-${{ github.event_name == 'pull_request' && format('PR{0}', github.event.pull_request.number) || github.ref_name }}-run${{ github.run_number }}
          path: dist/RobloxAccountManager.exe
          retention-days: 14

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const sha = context.payload.pull_request.head.sha.substring(0, 7);
            const body = [
              '### Test build ready',
              '',
              `**Commit:** \`${sha}\``,
              `**Download:** open the [workflow run](${runUrl}) and expand **Artifacts** at the bottom of the page.`,
              '',
              '_This comment is updated on every new push to the PR._',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(
              c => c.user.type === 'Bot' && c.body.includes('Test build ready')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
